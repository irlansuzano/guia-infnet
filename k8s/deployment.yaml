apiVersion: apps/v1
kind: Deployment
metadata:
  name: guia-app
  namespace: default
  labels:
    app: guia-app
spec:
  replicas: 4
  selector:
    matchLabels:
      app: guia-app
  template:
    metadata:
      labels:
        app: guia-app
    spec:
      containers:
        - name: app
          image: irlansuzano/guia-infnet
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 15

---
apiVersion: v1
kind: Service
metadata:
  name: guia-app
  namespace: default
spec:
  type: NodePort
  selector:
    app: guia-app
  ports:
    # Porta do Service 3000; NodePort no intervalo 30000–32767 é escolhido pelo cluster (evita "already allocated").
    - name: http
      port: 3000
      targetPort: http

---
# Grafana: datasource + dashboard (métricas do Prometheus)
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: default
data:
  datasources.yaml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        uid: prometheus
        isDefault: true
        jsonData:
          timeInterval: 15s

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: default
data:
  dashboards.yaml: |
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: Infnet
        type: file
        options:
          path: /var/lib/grafana/dashboards

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-json
  namespace: default
data:
  guia-infnet.json: |
    [
      {
        "type": "stat",
        "title": "Prometheus UP",
        "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
        "id": 1,
        "datasource": { "type": "prometheus", "uid": "prometheus" },
        "targets": [
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "up{job=\"prometheus\"}",
            "refId": "A"
          }
        ],
        "fieldConfig": { "defaults": { "unit": "short" } },
        "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
      },
      {
        "type": "stat",
        "title": "Series no TSDB",
        "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
        "id": 2,
        "datasource": { "type": "prometheus", "uid": "prometheus" },
        "targets": [
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "prometheus_tsdb_head_series",
            "refId": "A"
          }
        ],
        "fieldConfig": { "defaults": { "unit": "short" } },
        "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
      },
      {
        "type": "stat",
        "title": "Amostras no ultimo scrape",
        "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
        "id": 3,
        "datasource": { "type": "prometheus", "uid": "prometheus" },
        "targets": [
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "scrape_samples_scraped{job=\"prometheus\"}",
            "refId": "A"
          }
        ],
        "fieldConfig": { "defaults": { "unit": "short" } },
        "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
      },
      {
        "type": "stat",
        "title": "Memoria RSS (processo)",
        "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
        "id": 4,
        "datasource": { "type": "prometheus", "uid": "prometheus" },
        "targets": [
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "process_resident_memory_bytes{job=\"prometheus\"}",
            "refId": "A"
          }
        ],
        "fieldConfig": { "defaults": { "unit": "bytes" } },
        "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } }
      },
      {
        "type": "timeseries",
        "title": "Amostras anexadas ao TSDB / s",
        "gridPos": { "h": 9, "w": 12, "x": 0, "y": 4 },
        "id": 5,
        "datasource": { "type": "prometheus", "uid": "prometheus" },
        "fieldConfig": {
          "defaults": {
            "unit": "ops",
            "custom": {
              "drawStyle": "line",
              "fillOpacity": 20,
              "lineInterpolation": "smooth",
              "showPoints": "never"
            }
          }
        },
        "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
        "targets": [
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "rate(prometheus_tsdb_head_samples_appended_total[5m])",
            "legendFormat": "samples/s",
            "refId": "A"
          }
        ]
      },
      {
        "type": "timeseries",
        "title": "Duracao do scrape (seg)",
        "gridPos": { "h": 9, "w": 12, "x": 12, "y": 4 },
        "id": 6,
        "datasource": { "type": "prometheus", "uid": "prometheus" },
        "fieldConfig": {
          "defaults": {
            "unit": "s",
            "custom": {
              "drawStyle": "line",
              "fillOpacity": 20,
              "lineInterpolation": "smooth",
              "showPoints": "never"
            }
          }
        },
        "options": { "legend": { "displayMode": "list", "placement": "bottom" } },
        "targets": [
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "scrape_duration_seconds{job=\"prometheus\"}",
            "legendFormat": "{{instance}}",
            "refId": "A"
          }
        ]
      },

      {
        "type": "timeseries",
        "title": "CPU Usage",
        "gridPos": { "h": 8, "w": 12, "x": 0, "y": 13 },
        "id": 7,
        "datasource": { "type": "prometheus", "uid": "prometheus" },
        "fieldConfig": { "defaults": { "unit": "percentunit" } },
        "targets": [
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "rate(process_cpu_seconds_total{job=\"prometheus\"}[5m])",
            "legendFormat": "CPU",
            "refId": "A"
          }
        ]
      },
      {
        "type": "timeseries",
        "title": "Memory Usage",
        "gridPos": { "h": 8, "w": 12, "x": 12, "y": 13 },
        "id": 8,
        "datasource": { "type": "prometheus", "uid": "prometheus" },
        "fieldConfig": { "defaults": { "unit": "bytes" } },
        "targets": [
          {
            "datasource": { "type": "prometheus", "uid": "prometheus" },
            "expr": "process_resident_memory_bytes{job=\"prometheus\"}",
            "legendFormat": "Memory",
            "refId": "A"
          }
        ]
      }
    ]

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: grafana
  namespace: default
  labels:
    app: grafana
spec:
  replicas: 1
  selector:
    matchLabels:
      app: grafana
  template:
    metadata:
      labels:
        app: grafana
    spec:
      securityContext:
        fsGroup: 472
      containers:
        - name: grafana
          image: grafana/grafana:10.2.3
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: GF_SECURITY_ADMIN_USER
              value: admin
            - name: GF_SECURITY_ADMIN_PASSWORD
              value: admin123
            - name: GF_USERS_ALLOW_SIGN_UP
              value: "false"
          volumeMounts:
            - name: datasources
              mountPath: /etc/grafana/provisioning/datasources
            - name: dashboard-provider
              mountPath: /etc/grafana/provisioning/dashboards
            - name: dashboards
              mountPath: /var/lib/grafana/dashboards
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: datasources
          configMap:
            name: grafana-datasources
        - name: dashboard-provider
          configMap:
            name: grafana-dashboard-provider
        - name: dashboards
          configMap:
            name: grafana-dashboard-json

---
apiVersion: v1
kind: Service
metadata:
  name: grafana
  namespace: default
spec:
  type: NodePort
  selector:
    app: grafana
  ports:
    - name: http
      port: 3000
      targetPort: http
